services:
  - type: web
    name: danajet-api
    runtime: python
    plan: starter
    buildCommand: bash build.sh
    startCommand: gunicorn danajet_api.wsgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_MEDIA_ROOT
        value: /var/data/media
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SAMESITE
        value: None
      - key: DJANGO_CSRF_COOKIE_SAMESITE
        value: None
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_STORAGE_ENABLED
        value: "True"
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: SUPABASE_STORAGE_ENDPOINT
        sync: false
      - key: SUPABASE_STORAGE_PUBLIC_URL
        sync: false
      - key: SUPABASE_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: SUPABASE_STORAGE_REGION
        value: us-east-1
      - key: MEDIA_UPLOAD_MAX_MB
        value: "100"
      - key: MEDIA_IMAGE_MAX_WIDTH
        value: "1800"
      - key: MEDIA_IMAGE_MAX_HEIGHT
        value: "1800"
      - key: MEDIA_IMAGE_QUALITY
        value: "82"
