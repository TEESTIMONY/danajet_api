services:
  - type: web
    name: danajet-api
    runtime: python
    plan: starter
    buildCommand: bash build.sh
    startCommand: gunicorn danajet_api.wsgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_MEDIA_ROOT
        value: /var/data/media
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SAMESITE
        value: None
      - key: DJANGO_CSRF_COOKIE_SAMESITE
        value: None
      - key: DATABASE_URL
        fromDatabase:
          name: danajet-db
          property: connectionString
    disk:
      name: danajet-media
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: danajet-db
    plan: basic-256mb
